spring.application.name=analytics-service
server.port=4002

# Database Configuration (For running locally via IDE)
spring.datasource.url=jdbc:postgresql://localhost:5437/analyticsdb
spring.datasource.username=analytics_user
spring.datasource.password=analytics_password
spring.jpa.hibernate.ddl-auto=update

# Kafka
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=analytics-group
spring.kafka.consumer.auto-offset-reset=earliest

# Deserializers
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.pm.analytics_service.kafka.KafkaEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false