services:
  eureka-server:
    build: ./eureka-service
    container_name: eureka-server
    ports:
      - "8761:8761"

  # ---------------------------
  # Kafka + Zookeeper
  # ---------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # internal docker communication
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
  # ---------------------------
  # Databases
  # ---------------------------
  patient-postgres:
    image: postgres:15
    container_name: patient-db
    environment:
      POSTGRES_DB: patientdb
      POSTGRES_USER: patient_user
      POSTGRES_PASSWORD: patient_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  billing-postgres:
    image: postgres:15
    container_name: billing-db
    environment:
      POSTGRES_DB: billingdb
      POSTGRES_USER: billing_user
      POSTGRES_PASSWORD: billing_password
    ports:
      - "5434:5432"
    volumes:
      - billing_postgres_data:/var/lib/postgresql/data

  auth-postgres:
    image: postgres:15
    container_name: auth-db
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
    ports:
      - "5435:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data

  # ---------------------------
  # Billing Service
  # ---------------------------
  billing-service:
    build: ./billing-service
    container_name: billing-service
    ports:
      - "4001:4001"
    depends_on:
      - billing-postgres
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://billing-postgres:5432/billingdb
      SPRING_DATASOURCE_USERNAME: billing_user
      SPRING_DATASOURCE_PASSWORD: billing_password
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_SQL_INIT_MODE: always
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

  # ---------------------------
  # Patient Service (Kafka Producer)
  # ---------------------------
  patient-service:
    build: ./patient-service
    container_name: patient-service
    ports:
      - "4000:4000"
    depends_on:
      - patient-postgres
      - billing-service
      - eureka-server
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://patient-postgres:5432/patientdb
      SPRING_DATASOURCE_USERNAME: patient_user
      SPRING_DATASOURCE_PASSWORD: patient_password
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_SQL_INIT_MODE: always
      BILLING_SERVICE_URL: http://billing-service:4001
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_CACHE_TYPE: redis
      SPRING_CACHE_REDIS_HOSTNAME: redis
      SPRING_CACHE_REDIS_PORT: 6379    

      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  # ---------------------------
  # Analytics Service
  # ---------------------------
  analytics-service:
    build: ./analytics-service
    container_name: analytics-service
    ports:
      - "4002:4002"
    depends_on:
      - kafka
      - analytics-postgres
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:postgresql://analytics-postgres:5432/analyticsdb
      SPRING_DATASOURCE_USERNAME: analytics_user
      SPRING_DATASOURCE_PASSWORD: analytics_password
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_SQL_INIT_MODE: always

  # ---------------------------
  # BI Dashboard (No-Code UI)
  # ---------------------------
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    depends_on:
      - analytics-postgres
  
  # ---------------------------
  # API Gateway Service
  # ---------------------------
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "4004:4004"
    depends_on:
      - patient-service
      - eureka-server
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      

    # ---------------------------
  # Auth Service
  # ---------------------------
  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "4005:4005"
    depends_on:
      - auth-postgres
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-postgres:5432/authdb
      SPRING_DATASOURCE_USERNAME: auth_user
      SPRING_DATASOURCE_PASSWORD: auth_password
      SPRING_DATASOURCE_DRIVERCLASSNAME: org.postgresql.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: mysecretkeymysecretkeymysecretkeymysecretkey

  redis:
    image: redis
    container_name: redis
    ports:
      - "6379:6379"           
    volumes:
      - redis_data:/var/lib/redis/data

  appointment-postgres:
    image: postgres:15
    container_name: appointment-db
    environment:
      POSTGRES_DB: appointmentdb
      POSTGRES_USER: appointment_user
      POSTGRES_PASSWORD: appointment_password
    ports:
      - "5436:5432"
    volumes:
      - appointment_postgres_data:/var/lib/postgresql/data

  analytics-postgres:
    image: postgres:15
    container_name: analytics-db
    environment:
      POSTGRES_DB: analyticsdb
      POSTGRES_USER: analytics_user
      POSTGRES_PASSWORD: analytics_password
    ports:
      - "5437:5432"
    volumes:
      - analytics_postgres_data:/var/lib/postgresql/data

  appointment-service:
    build: ./appointment-service
    container_name: appointment-service
    ports:
      - "4006:4006"
    depends_on:
      - kafka
      - appointment-postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://appointment-postgres:5432/appointmentdb
      SPRING_DATASOURCE_USERNAME: appointment_user
      SPRING_DATASOURCE_PASSWORD: appointment_password
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_SQL_INIT_MODE: always
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  
volumes:
  postgres_data:
  billing_postgres_data:
  auth_postgres_data:
  redis_data:
  appointment_postgres_data:
  analytics_postgres_data: